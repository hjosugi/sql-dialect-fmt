<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <style>
      * { box-sizing: border-box; }
      html, body { width: 1280px; height: 720px; margin: 0; overflow: hidden; }
      body { display: grid; place-items: center; background: #0b2638; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      main { width: 900px; text-align: center; }
      h1 { margin: 0 0 34px; font-size: 40px; }
      .ways { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
      .way { padding: 25px 18px; border: 1px solid #31566a; border-radius: 12px; background: #102f42; }
      .way strong { display: block; margin-bottom: 8px; color: #55d6be; font-size: 17px; }
      .way span { color: #c2d3dd; font-size: 13px; }
      p { margin: 34px 0 0; color: #bce7df; font-size: 19px; }
    </style>
  </head>
  <body>
    <main>
      <h1>Run the formatter your way</h1>
      <div class="ways">
        <div class="way"><strong>Editor button</strong><span>Available inside supported SQL editors</span></div>
        <div class="way"><strong>Extension action</strong><span>Run from the Chrome toolbar</span></div>
        <div class="way"><strong>Alt + Shift + F</strong><span>Format with one keyboard shortcut</span></div>
      </div>
      <p>SQL text stays in the active editor. Formatting runs in bundled WebAssembly.</p>
    </main>
  </body>
</html>
