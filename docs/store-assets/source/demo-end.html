<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="tokens.css">
    <style>
      * { box-sizing: border-box; }
      html, body { width: 1280px; height: 720px; margin: 0; overflow: hidden; }
      body { display: grid; place-items: center; background: #0b2638; color: var(--sdf-color-white); font-family: var(--sdf-font-family-ui); }
      main { width: 900px; text-align: center; }
      h1 { margin: 0 0 var(--sdf-space-5xl); font-size: var(--sdf-font-size-display-md); }
      .ways { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--sdf-space-xl); }
      .way { padding: 25px var(--sdf-space-2xl); border: 1px solid #31566a; border-radius: var(--sdf-radius-xl); background: #102f42; }
      .way strong { display: block; margin-bottom: var(--sdf-space-sm); color: var(--sdf-color-accent); font-size: var(--sdf-font-size-lg); }
      .way span { color: #c2d3dd; font-size: var(--sdf-font-size-sm); }
      p { margin: var(--sdf-space-5xl) 0 0; color: #bce7df; font-size: var(--sdf-font-size-2xl); }
    </style>
  </head>
  <body>
    <main>
      <h1>Run the formatter your way</h1>
      <div class="ways">
        <div class="way"><strong>Editor button</strong><span>Available inside supported SQL editors</span></div>
        <div class="way"><strong>Extension action</strong><span>Run from the Chrome toolbar</span></div>
        <div class="way"><strong>Alt + Shift + F</strong><span>Format with one keyboard shortcut</span></div>
      </div>
      <p>SQL text stays in the active editor. Formatting runs in bundled WebAssembly.</p>
    </main>
  </body>
</html>
