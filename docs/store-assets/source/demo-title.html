<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <link rel="stylesheet" href="tokens.css">
    <style>
      * { box-sizing: border-box; }
      html, body { width: 1280px; height: 720px; margin: 0; overflow: hidden; }
      body { display: grid; place-items: center; background: radial-gradient(circle at 50% 42%, #174c50, #071d31 68%); color: var(--sdf-color-white); font-family: var(--sdf-font-family-ui); }
      main { display: grid; justify-items: center; text-align: center; }
      img { width: 164px; height: 164px; margin-bottom: var(--sdf-space-3xl); filter: drop-shadow(0 14px 30px rgb(0 0 0 / 28%)); }
      h1 { margin: 0; font-size: var(--sdf-font-size-display-lg); letter-spacing: -.025em; }
      p { margin: var(--sdf-space-lg) 0 0; color: #bce7df; font-size: var(--sdf-font-size-heading); }
      .dialects { display: flex; gap: var(--sdf-space-md); margin-top: var(--sdf-space-4xl); }
      .dialects span { padding: var(--sdf-space-sm) var(--sdf-space-lg); border: 1px solid #5f8d90; border-radius: var(--sdf-radius-pill); background: rgb(7 29 49 / 44%); font-size: var(--sdf-font-size-sm); font-weight: var(--sdf-font-weight-bold); }
    </style>
  </head>
  <body>
    <main>
      <img src="../../../extensions/chrome/images/icon128.png" alt="">
      <h1>sql-dialect-fmt for SQL editors</h1>
      <p>Format SQL locally in your browser.</p>
      <div class="dialects"><span>Snowflake</span><span>Databricks</span></div>
    </main>
  </body>
</html>
