<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <style>
      * { box-sizing: border-box; }
      html, body { width: 1280px; height: 720px; margin: 0; overflow: hidden; }
      body { display: grid; place-items: center; background: radial-gradient(circle at 50% 42%, #174c50, #071d31 68%); color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      main { display: grid; justify-items: center; text-align: center; }
      img { width: 164px; height: 164px; margin-bottom: 24px; filter: drop-shadow(0 14px 30px rgb(0 0 0 / 28%)); }
      h1 { margin: 0; font-size: 44px; letter-spacing: -.025em; }
      p { margin: 14px 0 0; color: #bce7df; font-size: 22px; }
      .dialects { display: flex; gap: 12px; margin-top: 28px; }
      .dialects span { padding: 8px 14px; border: 1px solid #5f8d90; border-radius: 999px; background: rgb(7 29 49 / 44%); font-size: 13px; font-weight: 700; }
    </style>
  </head>
  <body>
    <main>
      <img src="../../../extensions/chrome/images/icon128.png" alt="">
      <h1>sql-dialect-fmt for SQL editors</h1>
      <p>Format SQL locally in your browser.</p>
      <div class="dialects"><span>Snowflake</span><span>Databricks</span></div>
    </main>
  </body>
</html>
