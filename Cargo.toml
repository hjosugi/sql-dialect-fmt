[workspace]
resolver = "2"
members = ["crates/*"]

[workspace.package]
edition = "2021"
license = "MIT OR Apache-2.0"
repository = "https://github.com/your-org/frost"

# Optimize release builds for the "fast by default" goal.
[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
panic = "abort"
