[package]
name = "snow-fmt-cli"
version = "0.0.0"
edition = "2021"
license = "MIT OR Apache-2.0"
repository.workspace = true
description = "Command-line entry point for snow-fmt."

[[bin]]
name = "snow-fmt"
path = "src/main.rs"

[dependencies]
snow-fmt-encoding = { path = "../snow-fmt-encoding" }
snow-fmt-formatter = { path = "../snow-fmt-formatter" }

[dev-dependencies]
snow-fmt-test-fixtures = { path = "../snow-fmt-test-fixtures" }
