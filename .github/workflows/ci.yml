name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Format
        run: cargo fmt --all --check
      - name: Test
        run: cargo test --workspace
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  tree-sitter:
    name: Tree-sitter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Generate parser
        working-directory: tree-sitter-snowflake
        run: npm exec --package tree-sitter-cli@0.26.9 -- tree-sitter generate
      - name: Test grammar
        working-directory: tree-sitter-snowflake
        run: npm exec --package tree-sitter-cli@0.26.9 -- tree-sitter test
      - name: Generated files are committed
        run: git diff --exit-code -- tree-sitter-snowflake/src
