name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  MSRV: "1.94.0"

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: rust-${{ matrix.os }}
      - name: Format
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: cargo fmt --all --check
      - name: Test
        run: cargo test --workspace --locked
      - name: Docs
        if: ${{ matrix.os == 'ubuntu-latest' }}
        env:
          RUSTDOCFLAGS: -D warnings
        run: cargo doc --workspace --no-deps --locked
      - name: Benchmark smoke
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: cargo bench --locked -p sql-dialect-fmt-formatter --bench format -- --test
      - name: Clippy
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  msrv:
    name: MSRV (1.94.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.MSRV }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: msrv-${{ env.MSRV }}
      - name: Check workspace
        run: cargo check --workspace --all-targets --locked

  formatter-features:
    name: Formatter features (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: minimal
            args: --no-default-features
            forbidden: biome|ruff
          - name: javascript-only
            args: --no-default-features --features embedded-javascript
            forbidden: ruff
          - name: python-only
            args: --no-default-features --features embedded-python
            forbidden: biome
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: formatter-features-${{ matrix.name }}
      - name: Test formatter feature selection
        run: cargo test --locked -p sql-dialect-fmt-formatter ${{ matrix.args }}
      - name: Verify formatter dependency isolation
        shell: bash
        run: |
          if cargo tree --locked -e normal -p sql-dialect-fmt-formatter ${{ matrix.args }} | grep -Eiq '${{ matrix.forbidden }}'; then
            echo "unexpected dependency matched: ${{ matrix.forbidden }}"
            exit 1
          fi

  wasm:
    name: Wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          key: wasm32-unknown-unknown
      - name: Build wasm package
        run: cargo build -p sql-dialect-fmt-wasm --target wasm32-unknown-unknown --locked

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          rust-version: ${{ env.MSRV }}
          command: check
          command-arguments: advisories bans licenses sources

  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    env:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: coverage
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Generate coverage report
        run: |
          mkdir -p target/coverage
          cargo llvm-cov --workspace --locked --lcov --output-path target/coverage/lcov.info
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-lcov
          path: target/coverage/lcov.info
          if-no-files-found: error
      - name: Upload coverage to Codecov
        if: ${{ env.CODECOV_TOKEN != '' }}
        uses: codecov/codecov-action@v7
        with:
          files: target/coverage/lcov.info
          token: ${{ env.CODECOV_TOKEN }}
          fail_ci_if_error: true

  tree-sitter:
    name: Tree-sitter
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: tree-sitter-snowflake/package.json
      - name: Generate parser
        working-directory: tree-sitter-snowflake
        run: npm exec --package tree-sitter-cli@0.26.9 -- tree-sitter generate
      - name: Test grammar
        working-directory: tree-sitter-snowflake
        run: npm exec --package tree-sitter-cli@0.26.9 -- tree-sitter test
      - name: Generated files are committed
        run: git diff --exit-code -- tree-sitter-snowflake/src
