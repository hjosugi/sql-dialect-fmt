name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build release binary
        run: cargo build --release -p snow-fmt-cli
      - name: Package binary
        run: |
          asset="snow-fmt-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz"
          tar -czf "$asset" -C target/release snow-fmt
          sha256sum "$asset" > "$asset.sha256"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            "snow-fmt-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz" \
            "snow-fmt-${{ github.ref_name }}-x86_64-unknown-linux-gnu.tar.gz.sha256"
