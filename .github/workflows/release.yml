name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag to create (e.g. v0.1.0)"
        required: true
        default: v0.1.0

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Resolve version
        id: version
        run: echo "version=${{ github.event.inputs.version || github.ref_name }}" >> "$GITHUB_OUTPUT"
      - name: Build release binary
        run: cargo build --release -p snow-fmt-cli
      - name: Package binary
        run: |
          asset="snow-fmt-${{ steps.version.outputs.version }}-x86_64-unknown-linux-gnu.tar.gz"
          tar -czf "$asset" -C target/release snow-fmt
          sha256sum "$asset" > "$asset.sha256"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          v="${{ steps.version.outputs.version }}"
          # When dispatched, the tag does not exist yet; --target creates it at this commit.
          # When triggered by a tag push, the tag already exists and --target is ignored.
          gh release create "$v" \
            --repo "${{ github.repository }}" \
            --target "${{ github.sha }}" \
            --title "$v" \
            --generate-notes \
            "snow-fmt-$v-x86_64-unknown-linux-gnu.tar.gz" \
            "snow-fmt-$v-x86_64-unknown-linux-gnu.tar.gz.sha256"
