name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag to create (e.g. v1.0.0)"
        required: true
        default: v1.0.0

permissions:
  contents: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Resolve version
        id: version
        run: echo "version=${{ github.event.inputs.version || github.ref_name }}" >> "$GITHUB_OUTPUT"
      - name: Build release binary
        run: cargo build --release -p sql-dialect-fmt --bin sql-dialect-fmt
      - name: Package binary
        run: |
          asset="sql-dialect-fmt-${{ steps.version.outputs.version }}-x86_64-unknown-linux-gnu.tar.gz"
          tar -czf "$asset" -C target/release sql-dialect-fmt
          sha256sum "$asset" > "$asset.sha256"
      - name: Package editor extensions
        run: |
          version="${{ steps.version.outputs.version }}"
          ./scripts/package-extensions.sh "${version#v}"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          v="${{ steps.version.outputs.version }}"
          if gh release view "$v" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release edit "$v" \
              --repo "${{ github.repository }}" \
              --target "${{ github.sha }}" \
              --title "$v"
            gh release upload "$v" \
              --repo "${{ github.repository }}" \
              --clobber \
              "sql-dialect-fmt-$v-x86_64-unknown-linux-gnu.tar.gz" \
              "sql-dialect-fmt-$v-x86_64-unknown-linux-gnu.tar.gz.sha256" \
              "target/dist/sql-dialect-fmt-$v-chrome.zip" \
              "target/dist/sql-dialect-fmt-$v.vsix"
          else
            # When dispatched, the tag does not exist yet; --target creates it at this commit.
            # When triggered by a tag push, the tag already exists and --target is ignored.
            gh release create "$v" \
              --repo "${{ github.repository }}" \
              --target "${{ github.sha }}" \
              --title "$v" \
              --generate-notes \
              "sql-dialect-fmt-$v-x86_64-unknown-linux-gnu.tar.gz" \
              "sql-dialect-fmt-$v-x86_64-unknown-linux-gnu.tar.gz.sha256" \
              "target/dist/sql-dialect-fmt-$v-chrome.zip" \
              "target/dist/sql-dialect-fmt-$v.vsix"
          fi
