name: Corpus

on:
  workflow_dispatch:
    inputs:
      corpus_url:
        description: "Optional .tar.gz/.tgz/.tar/.zip corpus archive URL"
        required: false
      corpus_limit:
        description: "Optional max number of SQL files to check"
        required: false
  schedule:
    - cron: "17 3 * * 1"
  pull_request:
  push:
    branches:
      - main

jobs:
  external-corpus:
    name: External corpus
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: external-corpus
      - name: Run external-corpus harness
        env:
          DISPATCH_CORPUS_URL: ${{ github.event.inputs.corpus_url }}
          CONFIGURED_CORPUS_URL: ${{ vars.SQL_DIALECT_FMT_EXTERNAL_CORPUS_URL }}
          DISPATCH_CORPUS_LIMIT: ${{ github.event.inputs.corpus_limit }}
          CONFIGURED_CORPUS_LIMIT: ${{ vars.SQL_DIALECT_FMT_EXTERNAL_CORPUS_LIMIT }}
        run: |
          url="${DISPATCH_CORPUS_URL:-${CONFIGURED_CORPUS_URL:-}}"
          limit="${DISPATCH_CORPUS_LIMIT:-${CONFIGURED_CORPUS_LIMIT:-}}"

          args=()
          if [ -n "$url" ]; then
            args+=(--url "$url")
          else
            args+=(--sample)
          fi

          if [ -n "$limit" ]; then
            args+=(--limit "$limit")
          fi

          ./scripts/run-external-corpus.sh "${args[@]}"
