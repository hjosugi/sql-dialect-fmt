version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      cargo:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/tree-sitter-snowflake"
    schedule:
      interval: "weekly"
    groups:
      tree-sitter-npm:
        patterns:
          - "*"

  - package-ecosystem: "npm"
    directory: "/editors"
    schedule:
      interval: "weekly"
    groups:
      editors-npm:
        patterns:
          - "*"
