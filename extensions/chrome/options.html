<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>sql-dialect-fmt options</title>
    <link rel="stylesheet" href="src/tokens.css">
    <link rel="stylesheet" href="src/options.css">
  </head>
  <body>
    <main>
      <h1>sql-dialect-fmt</h1>
      <form id="options-form">
        <label>
          Dialect
          <select name="dialect">
            <option value="snowflake">Snowflake</option>
            <option value="databricks">Databricks</option>
          </select>
        </label>
        <label>
          Line width
          <input name="lineWidth" type="number" min="1" max="300" step="1">
        </label>
        <label>
          Indent width
          <input name="indentWidth" type="number" min="1" max="16" step="1">
        </label>
        <label class="checkbox">
          <input name="uppercaseKeywords" type="checkbox">
          Uppercase keywords
        </label>
        <button type="submit">Save</button>
        <p id="status" role="status" aria-live="polite"></p>
      </form>
    </main>
    <script src="src/options.js"></script>
  </body>
</html>
